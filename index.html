<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Camera</title>
    <style>
        :root {
            --bg-color: #000;
            --ui-bg: rgba(0, 0, 0, 0.4);
            --ui-blur: blur(10px);
            --text-color: #fff;
            --accent: #FFD600;
            --danger: #FF3B30;
            --success: #34C759;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Views */
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .view.hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* Camera View */
        #video-container {
            position: relative;
            flex: 1;
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* No filters applied per requirements */
        }

        /* Controls */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 20;
        }

        .top-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            z-index: 20;
        }

        /* Buttons */
        button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease;
        }

        button:active {
            transform: scale(0.9);
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--ui-bg);
            backdrop-filter: var(--ui-blur);
            -webkit-backdrop-filter: var(--ui-blur);
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .capture-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            position: relative;
        }

        .capture-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 54px;
            height: 54px;
            background: white;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .capture-btn:active::after {
            width: 48px;
            height: 48px;
        }

        .action-btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            background: var(--ui-bg);
            backdrop-filter: var(--ui-blur);
            -webkit-backdrop-filter: var(--ui-blur);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save { color: var(--success); }
        .btn-retake { color: var(--danger); }

        /* Preview View */
        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Gallery View */
        #gallery-view {
            background: var(--bg-color);
            z-index: 30;
            display: flex;
            flex-direction: column;
        }

        .gallery-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .storage-info {
            font-size: 14px;
            color: #888;
        }

        .gallery-grid {
            flex: 1;
            padding: 2px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            overflow-y: auto;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            background: #222;
            cursor: pointer;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:active img {
            transform: scale(0.95);
        }

        /* Full Image View */
        #full-image-view {
            z-index: 40;
            background: #000;
        }

        /* Tap to focus visual */
        #focus-ring {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1.5px solid var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease-out;
            z-index: 15;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #focus-ring.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="camera-view" class="view">
        <div id="video-container">
            <video id="camera-stream" autoplay playsinline></video>
            <div id="focus-ring"></div>
        </div>
        
        <div class="top-controls">
            <button class="icon-btn" id="btn-gallery" aria-label="Gallery">
                <svg viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
            </button>
            <button class="icon-btn" id="btn-switch-cam" aria-label="Switch Camera">
                <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5V13H9v2.5L5.5 12 9 8.5V11h6V8.5l3.5 3.5-3.5 3.5z"/></svg>
            </button>
        </div>

        <div class="controls-overlay">
            <div style="width: 44px;"></div> <button class="capture-btn" id="btn-capture" aria-label="Take Photo"></button>
            <div style="width: 44px;"></div> </div>
    </div>

    <div id="preview-view" class="view hidden">
        <img id="preview-img" alt="Capture Preview">
        <div class="controls-overlay">
            <button class="action-btn btn-retake" id="btn-retake">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
                Retake
            </button>
            <button class="action-btn btn-save" id="btn-save">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                Save
            </button>
        </div>
    </div>

    <div id="gallery-view" class="view hidden">
        <div class="gallery-header">
            <button class="icon-btn" id="btn-close-gallery">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
            </button>
            <span class="storage-info" id="storage-info">0 MB / 200 MB</span>
        </div>
        <div class="gallery-grid" id="gallery-grid">
            </div>
    </div>

    <div id="full-image-view" class="view hidden">
        <div class="top-controls">
            <button class="icon-btn" id="btn-close-full">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <button class="icon-btn" id="btn-delete-img" style="background: rgba(255,59,48,0.2);">
                <svg viewBox="0 0 24 24" fill="var(--danger)"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
        </div>
        <img id="full-img" alt="Full Resolution" style="width:100%; height:100%; object-fit:contain;">
    </div>

    <script>
        // --- Configuration & State ---
        const MAX_STORAGE_BYTES = 200 * 1024 * 1024; // 200 MB
        let currentStream = null;
        let facingMode = 'environment';
        let currentCaptureBlob = null;
        let activeFullImageId = null;
        let objectUrls = []; // Track to prevent memory leaks

        // --- DOM Elements ---
        const els = {
            viewCam: document.getElementById('camera-view'),
            viewPrev: document.getElementById('preview-view'),
            viewGal: document.getElementById('gallery-view'),
            viewFull: document.getElementById('full-image-view'),
            video: document.getElementById('camera-stream'),
            previewImg: document.getElementById('preview-img'),
            fullImg: document.getElementById('full-img'),
            grid: document.getElementById('gallery-grid'),
            focusRing: document.getElementById('focus-ring'),
            storageInfo: document.getElementById('storage-info'),
            videoContainer: document.getElementById('video-container')
        };

        // --- Haptics ---
        const vibrate = (ms = 50) => {
            if (navigator.vibrate) navigator.vibrate(ms);
        };

        // --- IndexedDB Wrapper ---
        const DB = {
            name: 'MinCamDB',
            version: 1,
            store: 'images',
            db: null,

            init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.name, this.version);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.store)) {
                            db.createObjectStore(this.store, { keyPath: 'id' });
                        }
                    };
                    req.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve();
                    };
                    req.onerror = () => reject(req.error);
                });
            },

            async add(blob) {
                await this.enforceLimit(blob.size);
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.store, 'readwrite');
                    const item = {
                        id: Date.now(),
                        blob: blob,
                        size: blob.size
                    };
                    tx.objectStore(this.store).add(item);
                    tx.oncomplete = () => resolve(item);
                    tx.onerror = () => reject(tx.error);
                });
            },

            getAll() {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.store, 'readonly');
                    const req = tx.objectStore(this.store).getAll();
                    req.onsuccess = () => {
                        // Sort newest first
                        resolve(req.result.sort((a, b) => b.id - a.id));
                    };
                    req.onerror = () => reject(req.error);
                });
            },

            delete(id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.store, 'readwrite');
                    tx.objectStore(this.store).delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async enforceLimit(newSize) {
                const images = await this.getAll();
                let totalSize = images.reduce((sum, img) => sum + img.size, 0);
                
                // Reverse to get oldest first for deletion
                const oldestFirst = [...images].reverse();
                
                for (const img of oldestFirst) {
                    if (totalSize + newSize <= MAX_STORAGE_BYTES) break;
                    await this.delete(img.id);
                    totalSize -= img.size;
                }
            },

            async getStats() {
                const images = await this.getAll();
                const size = images.reduce((sum, img) => sum + img.size, 0);
                return { size, count: images.length };
            }
        };

        // --- Camera Module ---
        const Camera = {
            async start() {
                if (currentStream) {
                    currentStream.getTracks().forEach(t => t.stop());
                }

                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };

                try {
                    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                    els.video.srcObject = currentStream;
                    await els.video.play();
                } catch (err) {
                    console.error('Camera access denied or unavailable', err);
                    alert('Could not access camera. Please check permissions.');
                }
            },

            toggle() {
                facingMode = facingMode === 'environment' ? 'user' : 'environment';
                this.start();
            },

            capture() {
                const canvas = document.createElement('canvas');
                // Use natural video dimensions to avoid stretching/processing
                canvas.width = els.video.videoWidth;
                canvas.height = els.video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                // Flip image if front camera
                if (facingMode === 'user') {
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                }

                // Draw exactly what the camera sees
                ctx.drawImage(els.video, 0, 0, canvas.width, canvas.height);
                
                return new Promise(resolve => {
                    // Export as JPEG with 0.95 quality (optimal balance of size/quality without filtering)
                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.95);
                });
            }
        };

        // --- UI Controllers ---
        const UI = {
            show(viewEl) {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                viewEl.classList.remove('hidden');
            },

            cleanupUrls() {
                objectUrls.forEach(url => URL.revokeObjectURL(url));
                objectUrls = [];
            },

            async updateGallery() {
                this.cleanupUrls();
                els.grid.innerHTML = '';
                
                const images = await DB.getAll();
                const stats = await DB.getStats();
                
                const mbUsed = (stats.size / (1024 * 1024)).toFixed(1);
                const mbMax = (MAX_STORAGE_BYTES / (1024 * 1024)).toFixed(0);
                els.storageInfo.textContent = `${mbUsed} MB / ${mbMax} MB`;

                if (images.length === 0) {
                    els.grid.innerHTML = '<div class="empty-state">No photos yet</div>';
                    return;
                }

                // Intersection Observer for lazy loading Blob URLs
                const observer = new IntersectionObserver((entries, obs) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const imgEl = entry.target;
                            const blob = imgEl.dataset.blob; // Temp storage of blob
                            if (blob) {
                                const url = URL.createObjectURL(blob);
                                objectUrls.push(url);
                                imgEl.src = url;
                                delete imgEl.dataset.blob; // Free memory reference
                                obs.unobserve(imgEl);
                            }
                        }
                    });
                }, { rootMargin: '100px' });

                images.forEach(imgData => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    
                    const img = document.createElement('img');
                    // Store blob reference temporarily for the observer
                    img.dataset.blob = imgData.blob; 
                    
                    div.appendChild(img);
                    observer.observe(img);

                    div.onclick = () => {
                        vibrate(20);
                        activeFullImageId = imgData.id;
                        els.fullImg.src = img.src; // reuse existing URL
                        UI.show(els.viewFull);
                    };

                    els.grid.appendChild(div);
                });
            },

            showTapFocus(e) {
                const rect = els.videoContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                els.focusRing.style.left = `${x}px`;
                els.focusRing.style.top = `${y}px`;
                
                // Trigger reflow to restart animation
                els.focusRing.classList.remove('active');
                void els.focusRing.offsetWidth; 
                els.focusRing.classList.add('active');

                setTimeout(() => {
                    els.focusRing.classList.remove('active');
                }, 1000);
            }
        };

        // --- Event Listeners ---
        document.getElementById('btn-switch-cam').onclick = () => {
            vibrate();
            Camera.toggle();
        };

        document.getElementById('btn-capture').onclick = async () => {
            vibrate(30);
            // Visual feedback
            els.video.style.opacity = 0.5;
            setTimeout(() => els.video.style.opacity = 1, 100);

            currentCaptureBlob = await Camera.capture();
            
            const url = URL.createObjectURL(currentCaptureBlob);
            els.previewImg.src = url;
            UI.show(els.viewPrev);
        };

        document.getElementById('btn-retake').onclick = () => {
            vibrate();
            URL.revokeObjectURL(els.previewImg.src);
            currentCaptureBlob = null;
            UI.show(els.viewCam);
        };

        document.getElementById('btn-save').onclick = async () => {
            vibrate(20);
            if (currentCaptureBlob) {
                await DB.add(currentCaptureBlob);
                URL.revokeObjectURL(els.previewImg.src);
                currentCaptureBlob = null;
                UI.show(els.viewCam);
            }
        };

        document.getElementById('btn-gallery').onclick = () => {
            vibrate();
            UI.updateGallery();
            UI.show(els.viewGal);
        };

        document.getElementById('btn-close-gallery').onclick = () => {
            vibrate();
            UI.cleanupUrls();
            UI.show(els.viewCam);
        };

        document.getElementById('btn-close-full').onclick = () => {
            vibrate();
            activeFullImageId = null;
            UI.show(els.viewGal);
        };

        document.getElementById('btn-delete-img').onclick = async () => {
            vibrate([30, 50, 30]);
            if (confirm('Delete this photo?')) {
                if (activeFullImageId) {
                    await DB.delete(activeFullImageId);
                    activeFullImageId = null;
                    await UI.updateGallery();
                    UI.show(els.viewGal);
                }
            }
        };

        // Tap to focus simulation
        els.videoContainer.addEventListener('click', (e) => {
            // Don't trigger if clicking UI elements
            if (e.target.tagName.toLowerCase() !== 'video') return;
            UI.showTapFocus(e);
            vibrate(10);
        });

        // --- App Boot ---
        window.onload = async () => {
            try {
                await DB.init();
                await Camera.start();
            } catch (e) {
                console.error("App Initialization Failed:", e);
            }
        };

        // Cleanup on close
        window.addEventListener('unload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            UI.cleanupUrls();
        });
    </script>
</body>
</html>
